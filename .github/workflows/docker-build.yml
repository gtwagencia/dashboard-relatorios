name: Build & Push Docker Images

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/metaads-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/metaads-backend:${{ github.sha }}

      - name: Build e push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/metaads-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/metaads-frontend:${{ github.sha }}

      - name: Resumo
        run: |
          echo "✅ Imagens publicadas no Docker Hub!"
          echo "Backend:  ${{ secrets.DOCKERHUB_USERNAME }}/metaads-backend:latest"
          echo "Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/metaads-frontend:latest"
