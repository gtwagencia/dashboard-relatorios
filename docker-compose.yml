version: '3.9'

# =============================================================
# Meta Ads Dashboard — Docker Swarm Stack
# Rede pública compartilhada: network_public (Traefik overlay)
# =============================================================
#
# PRÉ-REQUISITO: buildar as imagens no servidor antes de subir a stack.
# Execute no servidor (via SSH):
#   cd /caminho/do/projeto
#   docker build -t metaads-backend:latest ./backend
#   docker build -t metaads-frontend:latest ./frontend
#
# Depois suba a stack pelo Portainer (Stacks → Add Stack → Upload).
# =============================================================

networks:
  network_public:
    external: true

services:

  metaads-backend:
    image: metaads-backend:latest
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL}
      CORS_ORIGIN: https://${DOMAIN}
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        # Rota: dashboard.gtw.digital/api → backend:3001
        - "traefik.http.routers.metaads-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.metaads-api.entrypoints=websecure"
        - "traefik.http.routers.metaads-api.tls.certresolver=letsencrypt"
        - "traefik.http.services.metaads-api.loadbalancer.server.port=3001"

  metaads-frontend:
    image: metaads-frontend:latest
    environment:
      NODE_ENV: production
      # O frontend chama /api que o Traefik roteia para o backend
      NEXT_PUBLIC_API_URL: "https://${DOMAIN}/api"
    networks:
      - network_public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"
        # Rota: dashboard.gtw.digital → frontend:3000
        - "traefik.http.routers.metaads-frontend.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.metaads-frontend.entrypoints=websecure"
        - "traefik.http.routers.metaads-frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.metaads-frontend.loadbalancer.server.port=3000"
        # Prioridade menor que a rota do /api (para não capturar /api)
        - "traefik.http.routers.metaads-frontend.priority=1"
        - "traefik.http.routers.metaads-api.priority=10"
